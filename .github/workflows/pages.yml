# 정적 프론트(src/frontend)를 GitHub Pages로 배포.
# 최초 1회: 리포 Settings → Pages → Source를 "GitHub Actions"로 설정해야 이 워크플로가 게시됨.
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: # 수동 실행(최초 배포·강제 재배포)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 태그 조회(git describe)에 필요
      - name: Inject commit SHA + 최신 태그 (version 표기)
        run: |
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo dev)"
          sed -i "s/__COMMIT__/${GITHUB_SHA}/g" src/frontend/index.html
          sed -i "s/__VERSION__/${VERSION}/g" src/frontend/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/frontend
      - id: deployment
        uses: actions/deploy-pages@v4
