<script>
(function () {
  var SONGS = JSON.parse(document.getElementById('songs-data').textContent);
  var STORAGE_KEY = 'gems9_segment_tool_v1';

  var el = {
    progressChip: document.getElementById('progressChip'),
    menuBtn: document.getElementById('menuBtn'),
    bandChip: document.getElementById('bandChip'),
    songTitle: document.getElementById('songTitle'),
    idxNote: document.getElementById('idxNote'),
    timelineTrack: document.getElementById('timelineTrack'),
    timelineRange: document.getElementById('timelineRange'),
    timelineCursor: document.getElementById('timelineCursor'),
    timeCurrent: document.getElementById('timeCurrent'),
    timeDuration: document.getElementById('timeDuration'),
    startInput: document.getElementById('startInput'),
    endInput: document.getElementById('endInput'),
    setStartBtn: document.getElementById('setStartBtn'),
    setEndBtn: document.getElementById('setEndBtn'),
    introBtn: document.getElementById('introBtn'),
    durationChip: document.getElementById('durationChip'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    counter: document.getElementById('counter'),
    exportBtn: document.getElementById('exportBtn'),
    scrim: document.getElementById('scrim'),
    drawer: document.getElementById('drawer'),
    drawerList: document.getElementById('drawerList'),
    closeDrawerBtn: document.getElementById('closeDrawerBtn'),
    toast: document.getElementById('toast')
  };

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { currentIndex: 0, songs: {} };
      var parsed = JSON.parse(raw);
      return { currentIndex: parsed.currentIndex || 0, songs: parsed.songs || {} };
    } catch (e) {
      return { currentIndex: 0, songs: {} };
    }
  }

  var state = loadState();
  var duration = 0;
  var player = null;
  var pollTimer = null;
  var toastTimer = null;

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function currentSong() {
    return SONGS[state.currentIndex];
  }

  function currentSeg() {
    var song = currentSong();
    if (!song) return {};
    return state.songs[song.idx] || {};
  }

  function setSeg(patch) {
    var song = currentSong();
    var seg = state.songs[song.idx] || {};
    Object.assign(seg, patch);
    state.songs[song.idx] = seg;
    saveState();
    refreshDeck();
    refreshProgress();
  }

  function parseTime(str) {
    if (str == null) return null;
    str = String(str).trim();
    if (str === '') return null;
    if (str.indexOf(':') !== -1) {
      var parts = str.split(':');
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].trim() === '' || isNaN(Number(parts[i]))) return null;
      }
      var sec = 0;
      for (var j = 0; j < parts.length; j++) sec = sec * 60 + Number(parts[j]);
      return sec;
    }
    var n = Number(str);
    return isNaN(n) ? null : n;
  }

  function formatTime(sec) {
    if (sec == null || isNaN(sec)) return '';
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function isDone(idx) {
    var seg = state.songs[idx];
    return !!(seg && seg.start != null && seg.end != null && seg.end > seg.start);
  }

  function refreshProgress() {
    var done = 0;
    for (var i = 0; i < SONGS.length; i++) if (isDone(SONGS[i].idx)) done++;
    el.progressChip.textContent = done + ' / ' + SONGS.length + ' 완료';
  }

  function refreshMeta() {
    var song = currentSong();
    el.bandChip.textContent = song.band;
    el.songTitle.textContent = song.song;
    el.idxNote.textContent = 'idx ' + song.idx + ' · energy_full ' + song.energyFull.toFixed(2) +
      ' · ' + (state.currentIndex + 1) + '/' + SONGS.length;
    el.counter.textContent = (state.currentIndex + 1) + ' / ' + SONGS.length;
    el.prevBtn.disabled = state.currentIndex === 0;
    el.nextBtn.disabled = state.currentIndex === SONGS.length - 1;
  }

  function refreshDeck() {
    var seg = currentSeg();
    el.startInput.value = seg.start != null ? formatTime(seg.start) : '';
    el.endInput.value = seg.end != null ? formatTime(seg.end) : '';
    updateDurationChip(seg);
    updateTimelineRange(seg);
  }

  function updateDurationChip(seg) {
    seg = seg || currentSeg();
    var chip = el.durationChip;
    if (seg.start == null || seg.end == null) {
      chip.textContent = '구간 미설정';
      chip.className = 'duration-chip neutral';
      return;
    }
    var dur = seg.end - seg.start;
    if (dur <= 0) {
      chip.textContent = '오류 · 끝점이 시작점보다 앞섬';
      chip.className = 'duration-chip warn';
      return;
    }
    if (dur < 15 || dur > 45) {
      chip.textContent = Math.round(dur) + '초 · 권장범위(15–45초) 벗어남';
      chip.className = 'duration-chip warn';
      return;
    }
    chip.textContent = Math.round(dur) + '초 · 적정 구간';
    chip.className = 'duration-chip ok';
  }

  function updateTimelineRange(seg) {
    seg = seg || currentSeg();
    if (!duration || duration <= 0 || seg.start == null || seg.end == null) {
      el.timelineRange.style.left = '0%';
      el.timelineRange.style.width = '0%';
      return;
    }
    var left = Math.max(0, Math.min(100, (seg.start / duration) * 100));
    var right = Math.max(0, Math.min(100, (seg.end / duration) * 100));
    el.timelineRange.style.left = left + '%';
    el.timelineRange.style.width = Math.max(0, right - left) + '%';
  }

  function updateCursor(t) {
    if (!duration || duration <= 0) return;
    var pct = Math.max(0, Math.min(100, (t / duration) * 100));
    el.timelineCursor.style.left = pct + '%';
    el.timeCurrent.textContent = formatTime(t);
  }

  function toast(msg) {
    el.toast.textContent = msg;
    el.toast.hidden = false;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.toast.hidden = true; }, 3200);
  }

  // --- YouTube player ---
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('ytPlayer', {
      videoId: currentSong().videoId,
      playerVars: { rel: 0, modestbranding: 1 },
      events: {
        onReady: function () { pollDuration(); startPolling(); }
      }
    });
  };

  function pollDuration() {
    var tries = 0;
    var iv = setInterval(function () {
      tries++;
      var d = player.getDuration ? player.getDuration() : 0;
      if (d && d > 0) {
        duration = d;
        el.timeDuration.textContent = formatTime(d);
        updateTimelineRange();
        clearInterval(iv);
      } else if (tries > 40) {
        clearInterval(iv);
      }
    }, 250);
  }

  function startPolling() {
    clearInterval(pollTimer);
    pollTimer = setInterval(function () {
      if (player && player.getCurrentTime) {
        updateCursor(player.getCurrentTime());
      }
    }, 200);
  }

  function loadSong(index) {
    state.currentIndex = index;
    saveState();
    duration = 0;
    el.timeDuration.textContent = '0:00';
    el.timeCurrent.textContent = '0:00';
    el.timelineCursor.style.left = '0%';
    refreshMeta();
    refreshDeck();
    if (player && player.loadVideoById) {
      player.loadVideoById(currentSong().videoId);
      pollDuration();
    }
    renderDrawerList();
  }

  // --- controls ---
  el.setStartBtn.addEventListener('click', function () {
    if (!player || !player.getCurrentTime) return;
    setSeg({ start: player.getCurrentTime() });
  });

  el.setEndBtn.addEventListener('click', function () {
    if (!player || !player.getCurrentTime) return;
    setSeg({ end: player.getCurrentTime() });
  });

  el.introBtn.addEventListener('click', function () {
    setSeg({ start: 0, end: 30 });
  });

  el.startInput.addEventListener('change', function () {
    var v = parseTime(el.startInput.value);
    setSeg({ start: v });
  });

  el.endInput.addEventListener('change', function () {
    var v = parseTime(el.endInput.value);
    setSeg({ end: v });
  });

  el.timelineTrack.addEventListener('click', function (ev) {
    if (!duration || duration <= 0 || !player || !player.seekTo) return;
    var rect = el.timelineTrack.getBoundingClientRect();
    var pct = (ev.clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    player.seekTo(pct * duration, true);
  });

  el.prevBtn.addEventListener('click', function () {
    if (state.currentIndex > 0) loadSong(state.currentIndex - 1);
  });

  el.nextBtn.addEventListener('click', function () {
    if (state.currentIndex < SONGS.length - 1) loadSong(state.currentIndex + 1);
  });

  el.menuBtn.addEventListener('click', openDrawer);
  el.closeDrawerBtn.addEventListener('click', closeDrawer);
  el.scrim.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape') closeDrawer();
  });

  function openDrawer() {
    renderDrawerList();
    el.scrim.hidden = false;
    el.drawer.hidden = false;
  }
  function closeDrawer() {
    el.scrim.hidden = true;
    el.drawer.hidden = true;
  }

  function renderDrawerList() {
    var html = '';
    var lastBand = null;
    for (var i = 0; i < SONGS.length; i++) {
      var s = SONGS[i];
      if (s.band !== lastBand) {
        html += '<div class="drawer-band">' + s.band + '</div>';
        lastBand = s.band;
      }
      var done = isDone(s.idx);
      var active = i === state.currentIndex;
      html += '<button class="drawer-item' + (done ? ' done' : '') + (active ? ' active' : '') +
        '" data-index="' + i + '" type="button">' +
        '<span class="dot"></span><span class="label">' + escapeHtml(s.song) + '</span></button>';
    }
    el.drawerList.innerHTML = html;
    var items = el.drawerList.querySelectorAll('.drawer-item');
    for (var k = 0; k < items.length; k++) {
      items[k].addEventListener('click', function () {
        loadSong(Number(this.getAttribute('data-index')));
        closeDrawer();
      });
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // --- export ---
  function csvEscape(v) {
    v = v == null ? '' : String(v);
    if (/[",\n]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
    return v;
  }

  function buildCsv() {
    var header = ['idx', 'band', 'song', 'url', 'energy_full', 'excerpt_start_sec', 'excerpt_end_sec',
      'wonder', 'transcendence', 'tenderness', 'nostalgia', 'peacefulness', 'power',
      'joyful_activation', 'tension', 'sadness', 'rater_note'];
    var lines = [header.join(',')];
    for (var i = 0; i < SONGS.length; i++) {
      var s = SONGS[i];
      var seg = state.songs[s.idx] || {};
      var url = 'https://youtu.be/' + s.videoId;
      var row = [s.idx, s.band, s.song, url, s.energyFull,
        seg.start != null ? seg.start : '', seg.end != null ? seg.end : '',
        '', '', '', '', '', '', '', '', '', ''];
      lines.push(row.map(csvEscape).join(','));
    }
    return lines.join('\n');
  }

  function downloadLocal(csv) {
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'gems9_pilot_candidates_segments.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast('저장 완료 — gems9_pilot_candidates_segments.csv');
  }

  el.exportBtn.addEventListener('click', function () {
    var csv = buildCsv();
    if (!window.claude || !window.claude.downloads) {
      // 로컬(file://, localhost 등)에서는 확장자 제한 없이 바로 .csv로 내려받는다.
      downloadLocal(csv);
      return;
    }
    window.claude.downloads.save({ filename: 'gems9_pilot_candidates_segments.txt', data: csv })
      .then(function () {
        toast('저장 완료 — 확장자를 .txt에서 .csv로 바꿔 기존 파일을 덮어써 주세요.');
      })
      .catch(function (err) {
        if (err && err.code === 'declined') return;
        toast('저장 실패: ' + ((err && err.message) || (err && err.code) || '알 수 없는 오류'));
      });
  });

  // --- init ---
  refreshMeta();
  refreshDeck();
  refreshProgress();
  renderDrawerList();
})();
</script>
